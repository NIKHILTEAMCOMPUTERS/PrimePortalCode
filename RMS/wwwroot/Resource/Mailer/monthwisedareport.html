<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime Mailer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sen:wght@400;700;800&display=swap"
          rel="stylesheet" />
</head>

<body style="font-family: 'Sen', sans-serif">
    <div class="mail-container" style="max-width: 800px; margin: 0 auto; border-top: 1px solid #f0f0f0;">
        <div>
            <!--<div class="logo" style="padding-top: 30px;display: flex">
        <a href="https://prime.teamcomputers.com/" target="_blank">
            <img src="https://prime-mailer.vercel.app/images/prime_logo_icon.png"
                 style="max-width: 50px;" />
        </a>
        <a href="https://prime.teamcomputers.com/" style="padding-top: 15px; padding-left: 5px;" target="_blank">
            <img src="https://prime-mailer.vercel.app/images/prime_logo_text.png"
                 style="max-width: 60px;" />

    </div>-->

            <div class="logo" style="padding-top: 30px; display: flex; border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; width: 800px;">
                <div style="width: fit-content; margin-left: auto;">
                    <a href="https://prime.teamcomputers.com/" target="_blank">
                        <img src="https://prime-mailer.vercel.app/images/prime_logo.png" style="max-width: 120px" />
                    </a>
                </div>
                <div style="width: 5%; margin-left: auto;">
                    <button type="button" onclick="printTable('report')" style="width: 100%; cursor: pointer; background-color: unset; border: transparent;"><img src="https://prime-mailer.vercel.app/images/print_icon.jpg" style="width: 100%;" alt="Print Icon"></button>
                </div>
            </div>


            <div style="width: 800px; border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0;">
                <p style="
              font-style: normal;
              font-weight: 800;
              font-size: 20px;
              text-transform: uppercase;
              color: #000;
              margin: unset;
              padding-top: 10px;
              padding-bottom: 10px;
              text-align: center;
            ">
                    Month <img src="https://prime-mailer.vercel.app/images/calender_icon.png" alt="Calender Icon" style="width: 6%; vertical-align: middle;"> Wise <span style="color: #00cc83;">DA</span> Report
                </p>
                <p style="font-style: normal;font-weight: 800;font-size: 16px;text-align: center;background-color: #29394314; width: fit-content; margin: auto; border-radius: 19px; padding: 5px 20px;">
                    Please find the attached month wise DA report below :  <b>{1}</b>
                </p>
            </div>

            <div class="position-info"
                 id="report"
                 style=" padding: 20px 50px; box-sizing: border-box; width: 800px; border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; ">
                {0}
            </div>

            <div style="width: 100%; background-color: #f3f3f3; padding-top: 10px; border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0;">
                <div style="width: 25%; text-align: center; margin: auto;">
                    <a style="
                padding: 10px 25px;
                background-color: #4b4e5c;
                box-shadow: 0px 4px 23.5px 0px #00000040;
                color: #fff;
                border-radius: 10px;
                text-decoration: none;
              "
                       href="https://prime.teamcomputers.com/">Prime Portal</a>
                </div>
            </div>
            <div class="footer"
                 style="
            box-sizing: border-box;
            background-color: #f3f3f3;
            padding: 50px 50px 10px 50px;
            color: #000000;
            width: 800px;
            margin-top:0;
            border-left: 1px solid #f0f0f0; 
          border-right: 1px solid #f0f0f0;
          border-bottom: 1px solid #f0f0f0;
          ">
                <div class="col1"
                     style="width: fit-content; margin: auto;">
                    <img src="https://www.teamcomputers.com/images/logo.png"
                         style="
                max-width: 105px;
                height: auto;
                margin-bottom: 10px;
                display: flex;
                margin-left: auto;
                margin-right: auto;
              " />
                    <p style="
                color: #000;
                font-size: 13px;
                font-weight: 500;
                margin: 0;
                text-align: center;
              ">
                        Team Computers Pvt. Ltd. © 2024 | All rights reserved.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function printTable(areaID) {{
                const report = document.getElementById(areaID).innerHTML;
                console.log(report);
                const pageContent = document.body.innerHTML;

                document.body.innerHTML = report;

                window.print();

                document.body.innerHTML = pageContent;
            }}
        
    </script>
</body>
</html>
